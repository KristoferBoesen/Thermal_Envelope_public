# =============================================================================
# preprocessor_config.yaml — User Settings for the Decay Heat Preprocessor
# =============================================================================
# All values here are defaults. Any can be overridden on the command line.
# Run with:  python -m decay_preprocessor.run_preprocessor
# =============================================================================

# --- Input files -------------------------------------------------------------

# Path to the isotope inventory CSV (columns: Isotope, Atoms).
# Lines starting with '#' are ignored.
inventory: examples/example_inventory.csv

# Path to the OpenMC-format decay chain XML file.
# Download from: https://openmc.org/nuclear-data/
chain: data/chain_endfb71_pwr.xml

# --- Waste form definition ---------------------------------------------------

# Mass of the WASTE MATERIAL ONLY in the inventory [kg].
# Do NOT use total canister mass or glass composite mass — see README.md.
sample_mass_kg: 100.0

# --- Simulation settings -----------------------------------------------------

# Simulation horizon [years].  Should cover the full cooling window of interest.
duration_years: 10.0

# Output directory for decay_curve.csv and decay_fit.png.
output_dir: results/decay/

# --- Solver settings (advanced) ----------------------------------------------

# Number of log-spaced time evaluation points in the Bateman solver.
n_points: 2000

# Discard data before this time [years] when fitting the exponential.
# Default (1/12 yr ≈ 1 month) excludes short-lived nuclides irrelevant
# to long-term canister cooling. 
# Should be less than pre-emplacement cooling - cooling_months - in root config. 
cutoff_years: 0.0833
