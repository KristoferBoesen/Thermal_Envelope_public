# =============================================================================
# config.yaml — User Settings for the Thermal Envelope Solver
# =============================================================================
# Edit this file to configure the simulation. All user-adjustable parameters
# are defined here. Run with:  python main.py
#
# Decay heat parameters (decay_terms) can be obtained by running the
# decay preprocessor on an isotope inventory:
#   python -m decay_preprocessor.run_preprocessor --help
# =============================================================================


# --- Waste Form Label --------------------------------------------------------
# Used in output filenames: Design_Envelope_<waste_form_name>_<repo>.csv
waste_form_name: "MyWasteForm"


# --- Safety Limits -----------------------------------------------------------

# Glass-transition temperature for vitrified waste forms [°C].
# For borosilicate glass the onset of devitrification is ~500 °C.
# Recommended: set safety_factor >= 1.25 so the effective limit falls below 400 °C.
centerline_limit_C: 400.0

# Safety factor applied as a divisor to ALL temperature limits:
#   Effective_Limit = Nominal_Limit / safety_factor
# 1.0 = no margin;  1.25 = 20% margin.
safety_factor: 1.0

# Repository surface temperature limits by geology [°C].
# Add or rename keys to match your repository type (use --repo flag to select).
surface_limits_C:
  Bentonite: 100.0
  Salt: 200.0


# --- Repository Conditions ---------------------------------------------------

ambient_temp_C: 40.0           # Tunnel / storage rack air temperature [°C]
h_passive: 5.0                 # Natural convection HTC [W/(m²·K)]


# --- Sweep Parameters --------------------------------------------------------

radii_min: 0.01                # Minimum canister radius [m]
radii_max: 0.8                 # Maximum canister radius [m]
radii_steps: 100               # Number of radius points to evaluate
loadings_pct: [5, 10, 15, 20] # Waste loading percentages to evaluate


# --- Feasibility Limits (stop exploring beyond these) -----------------------

max_h_active: 200.0            # Max practical HTC [W/(m²·K)]
max_cooling_years: 10.0        # Max acceptable pre-emplacement cooling [years]


# --- Solver Settings ---------------------------------------------------------

nodes: 50                      # Radial finite-difference nodes
max_years: 50.0                # Maximum transient simulation time [years]
cooling_months: 1.0            # Pre-emplacement cooling already applied [months]


# --- Waste Form Definition ---------------------------------------------------
# cp and k are Python expression strings with T as temperature in Kelvin.
# numpy is available as np. Any functional form can be expressed:
#
#   Constant:   cp: "500.0"
#   Polynomial: cp: "500.0 + 0.5*T - 1e-4*T**2"
#   Shomate:    cp: "A + B*(T/1000) + C*(T/1000)**2 + D*(T/1000)**3 + E/(T/1000)**2"
#   Power law:  k:  "200.0 * T**0.35"
#   Piecewise:  cp: "np.interp(T, [300,400,500,600], [450,500,540,570])"
#
# Decay convention:  list of [Amplitude_W/kg, DecayConstant_1/yr] pairs
#   Q(t) = Σ Aᵢ · exp(−λᵢ · t)   where t is in years.
#
# Run the decay preprocessor to generate decay_terms from an isotope inventory.

waste_form:
  rho_base: 2500.0                         # Base glass density [kg/m³]
  decay_terms:
    - [100.0,  5.0]                         # [Amplitude W/kg, DecayConstant yr⁻¹]
    - [ 20.0,  0.5]
    - [  2.0,  0.05]
  cp: "500.0 + 0.5*T"          # Specific heat [J/(kg·K)], T in Kelvin
  k:  "2.0 - 1.0e-3*T"         # Thermal conductivity [W/(m·K)], T in Kelvin
